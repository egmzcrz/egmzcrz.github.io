<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Schedule Model Tests</title>
  <style>
    body { font-family: -apple-system, sans-serif; max-width: 800px; margin: 24px auto; padding: 0 16px; }
    h1 { font-size: 18px; }
    .suite { margin: 16px 0; }
    .suite h2 { font-size: 14px; color: #64748b; border-bottom: 1px solid #e2e8f0; padding-bottom: 4px; }
    .pass { color: #22c55e; }
    .fail { color: #ef4444; font-weight: 600; }
    .result { font-family: monospace; font-size: 12px; margin: 2px 0; }
    .summary { margin-top: 20px; padding: 12px; border-radius: 6px; font-weight: 600; }
    .summary.all-pass { background: #f0fdf4; color: #16a34a; }
    .summary.has-fail { background: #fef2f2; color: #dc2626; }
  </style>
</head>
<body>
  <h1>Schedule Model Unit Tests</h1>
  <div id="results"></div>

  <!-- Load JS dependencies in order -->
  <script src="../js/constants.js"></script>
  <script src="../js/utils.js"></script>
  <script src="../js/state-manager.js"></script>
  <script src="../js/state.js"></script>
  <script src="../js/schedule.js"></script>

  <script>
  // =============================================================
  // TEST HARNESS
  // =============================================================
  let passed = 0, failed = 0;
  const results = document.getElementById('results');

  function suite(name, tests) {
    const div = document.createElement('div');
    div.className = 'suite';
    div.innerHTML = '<h2>' + name + '</h2>';
    results.appendChild(div);

    tests.forEach(function(t) {
      try {
        t.fn();
        passed++;
        div.innerHTML += '<div class="result pass">✓ ' + t.name + '</div>';
      } catch (e) {
        failed++;
        div.innerHTML += '<div class="result fail">✗ ' + t.name + '<br>&nbsp;&nbsp;' + e.message + '</div>';
      }
    });
  }

  function assert(condition, msg) {
    if (!condition) throw new Error(msg || 'assertion failed');
  }

  function assertEqual(actual, expected, msg) {
    if (actual !== expected) {
      throw new Error((msg || '') + ' expected ' + JSON.stringify(expected) + ' got ' + JSON.stringify(actual));
    }
  }

  function assertClose(actual, expected, epsilon, msg) {
    if (Math.abs(actual - expected) > (epsilon || 0.001)) {
      throw new Error((msg || '') + ' expected ~' + expected + ' got ' + actual);
    }
  }

  // =============================================================
  // SETUP: mock STATE with test corridor data
  // =============================================================
  // Simple 3-station corridor: A (km 0) → B (km 10) → C (km 25)
  // Running times: A→B = 5 min, B→C = 10 min
  // Dwell times: A=0, B=2 min, C=0
  STATE.services = {
    'TestCorridor': {
      nodes: [
        { name: 'Station A', km: 0,  time_min: 0,  dwell_s: 0,  dwell_min: 0 },
        { name: 'Station B', km: 10, time_min: 5,  dwell_s: 120, dwell_min: 2 },
        { name: 'Station C', km: 25, time_min: 15, dwell_s: 0,  dwell_min: 0 }
      ],
      positions: { 'Station A': 0, 'Station B': 10, 'Station C': 25 },
      baseRunningTime: {
        'Station A→Station B': 5,
        'Station B→Station C': 10
      },
      baseDwellTime: {
        'Station A': 0,
        'Station B': 2,
        'Station C': 0
      },
      singleTrackSegments: []
    }
  };

  // =============================================================
  // TESTS: formatTimeHHMM
  // =============================================================
  suite('formatTimeHHMM', [
    { name: 'midnight', fn: function() { assertEqual(formatTimeHHMM(0), '00:00:00'); } },
    { name: '6:30 AM',  fn: function() { assertEqual(formatTimeHHMM(390), '06:30:00'); } },
    { name: 'noon',     fn: function() { assertEqual(formatTimeHHMM(720), '12:00:00'); } },
    { name: '23:59:30', fn: function() { assertEqual(formatTimeHHMM(1439.5), '23:59:30'); } },
    { name: 'fractional seconds round up', fn: function() { assertEqual(formatTimeHHMM(60.0084), '01:00:01'); } }
  ]);

  // =============================================================
  // TESTS: parseTimeHHMM
  // =============================================================
  suite('parseTimeHHMM', [
    { name: 'HH:MM',       fn: function() { assertEqual(parseTimeHHMM('06:30'), 390); } },
    { name: 'HH:MM:SS',    fn: function() { assertEqual(parseTimeHHMM('12:00:30'), 720.5); } },
    { name: 'midnight',    fn: function() { assertEqual(parseTimeHHMM('00:00'), 0); } },
    { name: '23:59',       fn: function() { assertEqual(parseTimeHHMM('23:59'), 1439); } },
    { name: 'invalid',     fn: function() { assert(isNaN(parseTimeHHMM('abc'))); } },
    { name: 'empty',       fn: function() { assert(isNaN(parseTimeHHMM(''))); } }
  ]);

  // =============================================================
  // TESTS: formatTimeHHMM ↔ parseTimeHHMM round-trip
  // =============================================================
  suite('format ↔ parse round-trip', [
    { name: '6:00', fn: function() {
      assertClose(parseTimeHHMM(formatTimeHHMM(360)), 360, 0.02);
    } },
    { name: '14:30', fn: function() {
      assertClose(parseTimeHHMM(formatTimeHHMM(870)), 870, 0.02);
    } }
  ]);

  // =============================================================
  // TESTS: buildTripTimesForService
  // =============================================================
  suite('buildTripTimesForService', [
    { name: '3-station northbound', fn: function() {
      const nodes = STATE.services['TestCorridor'].nodes;
      const rt = STATE.services['TestCorridor'].baseRunningTime;
      const times = buildTripTimesForService(nodes, 360, rt);  // start 06:00

      assertEqual(times.length, 3, 'should have 3 stations');
      assertEqual(times[0].node, 'Station A');
      assertEqual(times[0].arr, 360);  // 06:00
      assertEqual(times[0].dep, 360);  // dwell 0
      assertEqual(times[1].node, 'Station B');
      assertEqual(times[1].arr, 365);  // 360 + 5 run
      assertEqual(times[1].dep, 367);  // 365 + 2 dwell
      assertEqual(times[2].node, 'Station C');
      assertEqual(times[2].arr, 377);  // 367 + 10 run
      assertEqual(times[2].dep, 377);  // dwell 0
    } },
    { name: 'single station', fn: function() {
      const nodes = [{ name: 'Only', km: 0, dwell_min: 1 }];
      const times = buildTripTimesForService(nodes, 0, {});
      assertEqual(times.length, 1);
      assertEqual(times[0].arr, 0);
      assertEqual(times[0].dep, 1);
    } }
  ]);

  // =============================================================
  // TESTS: constrainTime
  // =============================================================
  suite('constrainTime', [
    { name: 'arrival at station 0 cannot be negative', fn: function() {
      const svc = {
        times: [
          { node: 'Station A', arr: 100, dep: 100 },
          { node: 'Station B', arr: 105, dep: 107 }
        ]
      };
      const result = constrainTime(svc, 0, true, -50, 'TestCorridor');
      assertEqual(result, 0);
    } },
    { name: 'arrival must respect running time from previous departure', fn: function() {
      const svc = {
        times: [
          { node: 'Station A', arr: 100, dep: 100 },
          { node: 'Station B', arr: 105, dep: 107 }
        ]
      };
      // Station B arrival cannot be before Station A departure + 5 min (running time)
      const result = constrainTime(svc, 1, true, 102, 'TestCorridor');
      assertEqual(result, 105);  // 100 + 5
    } },
    { name: 'departure must respect dwell time', fn: function() {
      const svc = {
        times: [
          { node: 'Station A', arr: 100, dep: 100 },
          { node: 'Station B', arr: 105, dep: 107 }
        ]
      };
      // Station B departure must be >= arrival + 2 min dwell
      const result = constrainTime(svc, 1, false, 106, 'TestCorridor');
      assertEqual(result, 107);  // 105 + 2
    } },
    { name: 'valid edit passes through unchanged', fn: function() {
      const svc = {
        times: [
          { node: 'Station A', arr: 100, dep: 100 },
          { node: 'Station B', arr: 105, dep: 107 }
        ]
      };
      const result = constrainTime(svc, 1, true, 110, 'TestCorridor');
      assertEqual(result, 110);  // 110 > 105, allowed
    } }
  ]);

  // =============================================================
  // TESTS: enforceConstraints
  // =============================================================
  suite('enforceConstraints', [
    { name: 'fixes running time violation', fn: function() {
      const svc = {
        times: [
          { node: 'Station A', arr: 100, dep: 100 },
          { node: 'Station B', arr: 102, dep: 104 },  // arr-dep of prev = 2, but minRT = 5
          { node: 'Station C', arr: 110, dep: 110 }
        ]
      };
      enforceConstraints(svc, 'TestCorridor');
      // Station B arrival should be at least 100 + 5 = 105
      assert(svc.times[1].arr >= 105, 'Station B arr should be >= 105');
      // Station C should also be shifted
      assert(svc.times[2].arr > 110, 'Station C should be pushed forward');
    } },
    { name: 'fixes dwell time violation', fn: function() {
      const svc = {
        times: [
          { node: 'Station A', arr: 100, dep: 100 },
          { node: 'Station B', arr: 105, dep: 106 },  // dwell = 1, but minDwell = 2
          { node: 'Station C', arr: 116, dep: 116 }
        ]
      };
      enforceConstraints(svc, 'TestCorridor');
      assertEqual(svc.times[1].dep, 107);  // 105 + 2
    } },
    { name: 'already-valid data unchanged', fn: function() {
      const svc = {
        times: [
          { node: 'Station A', arr: 100, dep: 100 },
          { node: 'Station B', arr: 105, dep: 107 },
          { node: 'Station C', arr: 117, dep: 117 }
        ]
      };
      const copy = JSON.parse(JSON.stringify(svc.times));
      enforceConstraints(svc, 'TestCorridor');
      assertEqual(JSON.stringify(svc.times), JSON.stringify(copy));
    } }
  ]);

  // =============================================================
  // TESTS: applyTimeDelta
  // =============================================================
  suite('applyTimeDelta', [
    { name: 'forward propagation shifts later stations', fn: function() {
      const svc = {
        times: [
          { node: 'Station A', arr: 100, dep: 100 },
          { node: 'Station B', arr: 105, dep: 107 },
          { node: 'Station C', arr: 117, dep: 117 }
        ]
      };
      applyTimeDelta(svc, 1, true, 110, 'TestCorridor');  // delay Station B arrival by 5
      // Station B arrival should be at least 110 (constrained might increase it)
      assert(svc.times[1].arr >= 110);
      // Station C should also shift
      assert(svc.times[2].arr > 117);
    } },
    { name: 'zero delta does nothing', fn: function() {
      const svc = {
        times: [
          { node: 'Station A', arr: 100, dep: 100 },
          { node: 'Station B', arr: 105, dep: 107 }
        ]
      };
      const copy = JSON.parse(JSON.stringify(svc.times));
      applyTimeDelta(svc, 1, true, 105, 'TestCorridor');  // no change
      assertEqual(JSON.stringify(svc.times), JSON.stringify(copy));
    } }
  ]);

  // =============================================================
  // SUMMARY
  // =============================================================
  const summary = document.createElement('div');
  summary.className = 'summary ' + (failed === 0 ? 'all-pass' : 'has-fail');
  summary.textContent = passed + ' passed, ' + failed + ' failed';
  results.appendChild(summary);
  </script>
</body>
</html>
