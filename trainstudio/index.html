<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Train Studio</title>

    <!-- Font Awesome 6 -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css"
          integrity="sha384-t1nt8BQoYMLFN5p42tRAtuAAFQaCQODekUVeKKZrEnEyp4H2R0RHFz0KWpmj7i8g"
          crossorigin="anonymous" referrerpolicy="no-referrer">

    <!-- Application styles -->
    <link rel="stylesheet" href="css/styles.css">

    <!-- D3.js v7 (vendored locally to avoid a hard CDN dependency) -->
    <script src="vendor/d3.v7.min.js"></script>

    <!-- js-yaml for rolling-stock YAML (vendored locally) -->
    <script src="vendor/js-yaml.min.js"></script>
  </head>
  <body>

    <!-- ============================================================
    App Shell
    ============================================================ -->
    <div id="app">

      <!-- Top Bar — single row, organized into divider-separated groups.
           Low-frequency display/filter controls collapse into the View popover. -->
      <div id="topbar">
        <span class="logo"><i class="fa-solid fa-train-subway"></i> Train Studio</span>

        <span class="topbar-divider" aria-hidden="true"></span>

        <!-- Plan actions -->
        <div class="topbar-group">
          <button id="btn-add-plan" class="btn btn-primary">
            <i class="fa-solid fa-plus" aria-hidden="true"></i> Add Service Plan
          </button>
          <button id="btn-edit-plans" class="btn btn-outline" disabled>
            <i class="fa-solid fa-sliders" aria-hidden="true"></i> Edit Plans
          </button>
        </div>

        <span class="topbar-divider" aria-hidden="true"></span>

        <!-- History & view -->
        <div class="topbar-group">
          <button id="btn-undo" class="btn-icon" disabled title="Undo (Ctrl+Z)" aria-label="Undo (Ctrl+Z)">
            <i class="fa-solid fa-rotate-left" aria-hidden="true"></i>
          </button>
          <button id="btn-redo" class="btn-icon" disabled title="Redo (Ctrl+Shift+Z)" aria-label="Redo (Ctrl+Shift+Z)">
            <i class="fa-solid fa-rotate-right" aria-hidden="true"></i>
          </button>
          <button id="btn-fit" class="btn-icon" disabled title="Fit to view (F)" aria-label="Fit to view (F)">
            <i class="fa-solid fa-expand" aria-hidden="true"></i>
          </button>
        </div>

        <span class="topbar-divider" aria-hidden="true"></span>

        <!-- Display & filter popover -->
        <div class="topbar-group popover-wrap">
          <button id="btn-view-menu" class="btn btn-outline" data-popover="view-popover"
                  aria-haspopup="true" aria-expanded="false">
            <i class="fa-solid fa-sliders" aria-hidden="true"></i> View
            <i class="fa-solid fa-chevron-down chevron" aria-hidden="true"></i>
          </button>

          <div id="view-popover" class="popover" hidden>
            <div class="popover-section">
              <div class="popover-label">Corridor</div>
              <select id="corridor-select" class="form-select" aria-label="Corridor (Y-axis)" disabled>
                <option value="">Load data first...</option>
              </select>
            </div>

            <div class="popover-divider" aria-hidden="true"></div>

            <div class="popover-section">
              <div class="popover-label">Time range</div>
              <div class="popover-row">
                <input id="time-start" class="time-filter-input" type="text" placeholder="Start" maxlength="8" aria-label="Time filter start (HH:MM:SS)">
                <span class="time-filter-dash" aria-hidden="true">–</span>
                <input id="time-end" class="time-filter-input" type="text" placeholder="End" maxlength="8" aria-label="Time filter end (HH:MM:SS)">
              </div>
              <div class="popover-row popover-actions">
                <button id="btn-time-apply" class="btn btn-sm btn-outline">Apply</button>
                <button id="btn-time-reset" class="btn btn-sm btn-ghost btn-reset">Reset</button>
              </div>
            </div>
          </div>
        </div>

        <div class="spacer"></div>

        <button id="btn-download" class="btn btn-outline" disabled>
          <i class="fa-solid fa-download" aria-hidden="true"></i> Download
        </button>
      </div>

      <!-- Main Area -->
      <div id="main">
        <!-- Chart Panel -->
        <div id="chart-panel">
          <svg id="chart-svg"></svg>
          <div id="chart-legend"></div>
          <div id="chart-tooltip"></div>
        </div>

        <!-- Detail Panel -->
        <div id="detail-panel">
          <div class="empty-state" id="detail-empty">
            <i class="fa-solid fa-hand-pointer"></i>
            <p>Click a service on the chart<br>to view &amp; edit its schedule</p>
          </div>
          <div id="detail-content" style="display:none; flex-direction:column; flex:1;"></div>
        </div>
      </div>

    </div>

    <!-- ============================================================
    Modals (hidden by default)
    ============================================================ -->

    <!-- Add Service Plan Modal -->
    <div id="modal-add-plan" class="modal-overlay" style="display:none;">
      <div class="modal" role="dialog" aria-modal="true" aria-labelledby="modal-add-plan-title">
        <div class="modal-header">
          <h2 id="modal-add-plan-title">Add Service Plan</h2>
          <button class="btn-icon" data-close="modal-add-plan" aria-label="Close">
            <i class="fa-solid fa-xmark" aria-hidden="true"></i>
          </button>
        </div>
        <div class="modal-body">
          <div class="form-group">
            <label class="form-label">Plan Name</label>
            <input id="add-plan-name" class="form-input" type="text" required placeholder="Plan Service 1">
          </div>
          <div class="form-row">
            <div class="form-group">
              <label class="form-label">Track Geometry (CSV)</label>
              <input id="add-geom-file" class="form-input" type="file" accept=".csv">
            </div>
            <div class="form-group">
              <label class="form-label">Rolling Stock (YAML)</label>
              <input id="add-stock-file" class="form-input" type="file" accept=".yaml,.yml">
            </div>
          </div>
          <div class="form-row">
            <div class="form-group">
              <label class="form-label">Headway (min)</label>
              <input id="add-headway" class="form-input" type="number" value="15" min="1" step="1">
            </div>
            <div class="form-group">
              <label class="form-label">Start Offset (min from midnight)</label>
              <input id="add-start-offset" class="form-input" type="number" value="360" min="0" max="1440" step="1">
            </div>
          </div>
          <div class="form-row">
            <div class="form-group">
              <label class="form-label">Dwell at Stops (s)</label>
              <input id="add-dwell" class="form-input" type="number" value="30" min="0" step="1">
            </div>
            <div class="form-group">
              <label class="form-label">Direction</label>
              <select id="add-direction" class="form-select" style="width:100%;">
                <option value="both">Both (North &amp; South)</option>
                <option value="north">North only</option>
                <option value="south">South only</option>
              </select>
            </div>
          </div>
          <div class="form-group">
            <label class="form-label">Color</label>
            <div id="add-color-palette" class="color-palette"></div>
          </div>
        </div>
        <div class="modal-footer">
          <button class="btn btn-ghost" data-close="modal-add-plan">Cancel</button>
          <button class="btn btn-primary" id="btn-add-plan-confirm">Add Plan</button>
        </div>
      </div>
    </div>

    <!-- Edit Service Plans Modal -->
    <div id="modal-edit-plans" class="modal-overlay" style="display:none;">
      <div class="modal" role="dialog" aria-modal="true" aria-labelledby="modal-edit-plans-title">
        <div class="modal-header">
          <h2 id="modal-edit-plans-title">Service Plans</h2>
          <button class="btn-icon" data-close="modal-edit-plans" aria-label="Close">
            <i class="fa-solid fa-xmark" aria-hidden="true"></i>
          </button>
        </div>
        <div class="modal-body" id="edit-plans-list">
          <p style="color:var(--text-muted); font-size:13px;">No service plans yet.</p>
        </div>
        <div class="modal-footer">
          <button class="btn btn-ghost" data-close="modal-edit-plans">Close</button>
        </div>
      </div>
    </div>

    <!-- Welcome Overlay -->
    <div id="upload-overlay">
      <div class="upload-card" id="upload-card">
        <i class="fa-solid fa-train-subway"></i>
        <h2>Add a Service Plan</h2>
        <p>Click to load a track geometry (CSV) and<br>rolling stock (YAML), then simulate the timetable</p>
      </div>
    </div>

    <!-- Toast -->
    <div id="toast"></div>

    <!-- ============================================================
    Application entry point. ES modules resolve their own dependency
    graph, so only the entry module is referenced here.
    ============================================================ -->
    <script type="module" src="js/app.js"></script>

  </body>
</html>
