<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Marey Chart Service Planner</title>

    <!-- Font Awesome 6 -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">

    <!-- Application styles -->
    <link rel="stylesheet" href="css/styles.css">

    <!-- D3.js v7 -->
    <script src="https://d3js.org/d3.v7.min.js"></script>

    <!-- SheetJS for Excel -->
    <script src="https://cdn.sheetjs.com/xlsx-0.20.1/package/dist/xlsx.full.min.js"></script>
  </head>
  <body>

    <!-- ============================================================
    App Shell
    ============================================================ -->
    <div id="app">

      <!-- Top Bar -->
      <div id="topbar">
        <span class="logo"><i class="fa-solid fa-train-subway"></i> Marey Planner</span>

        <select id="corridor-select" class="form-select" disabled>
          <option value="">Load data first...</option>
        </select>

        <button id="btn-add-plan" class="btn btn-primary" disabled>
          <i class="fa-solid fa-plus"></i> Add Service Plan
        </button>

        <button id="btn-edit-plans" class="btn btn-outline" disabled>
          <i class="fa-solid fa-sliders"></i> Edit Plans
        </button>

        <button id="btn-undo" class="btn-icon" disabled title="Undo (Ctrl+Z)" style="opacity:0.4;">
          <i class="fa-solid fa-rotate-left"></i>
        </button>
        <button id="btn-redo" class="btn-icon" disabled title="Redo (Ctrl+Shift+Z)" style="opacity:0.4;">
          <i class="fa-solid fa-rotate-right"></i>
        </button>

        <div class="spacer"></div>

        <span class="time-filter-label">Time:</span>
        <input id="time-start" class="time-filter-input" type="text" placeholder="Start (HH:MM:SS)" maxlength="8">
        <span class="time-filter-dash">–</span>
        <input id="time-end" class="time-filter-input" type="text" placeholder="End (HH:MM:SS)" maxlength="8">
        <button id="btn-time-apply" class="btn btn-sm btn-outline">Apply</button>
        <button id="btn-time-reset" class="btn btn-sm btn-ghost" style="font-size:11px;">Reset</button>

        <button id="btn-download" class="btn btn-outline" disabled>
          <i class="fa-solid fa-download"></i> Download
        </button>
      </div>

      <!-- Main Area -->
      <div id="main">
        <!-- Chart Panel -->
        <div id="chart-panel">
          <svg id="chart-svg"></svg>
          <div id="chart-legend"></div>
          <div id="chart-tooltip"></div>
        </div>

        <!-- Detail Panel -->
        <div id="detail-panel">
          <div class="empty-state" id="detail-empty">
            <i class="fa-solid fa-hand-pointer"></i>
            <p>Click a service on the chart<br>to view &amp; edit its schedule</p>
          </div>
          <div id="detail-content" style="display:none; flex-direction:column; flex:1;"></div>
        </div>
      </div>

    </div>

    <!-- ============================================================
    Modals (hidden by default)
    ============================================================ -->

    <!-- Add Service Plan Modal -->
    <div id="modal-add-plan" class="modal-overlay" style="display:none;">
      <div class="modal">
        <div class="modal-header">
          <h2>Add Service Plan</h2>
          <button class="btn-icon" onclick="closeModal('modal-add-plan')">
            <i class="fa-solid fa-xmark"></i>
          </button>
        </div>
        <div class="modal-body">
          <div class="form-group">
            <label class="form-label">Service</label>
            <select id="add-service-select" class="form-select" style="width:100%;"></select>
          </div>
          <div class="form-row">
            <div class="form-group">
              <label class="form-label">Headway (min)</label>
              <input id="add-headway" class="form-input" type="number" value="15" min="1" step="1">
            </div>
            <div class="form-group">
              <label class="form-label">Start Offset (min from midnight)</label>
              <input id="add-start-offset" class="form-input" type="number" value="360" min="0" max="1440" step="1">
            </div>
          </div>
          <div class="form-row">
            <div class="form-group">
              <label class="form-label">Direction</label>
              <select id="add-direction" class="form-select" style="width:100%;">
                <option value="both">Both (North &amp; South)</option>
                <option value="north">North only</option>
                <option value="south">South only</option>
              </select>
            </div>
            <div class="form-group">
              <label class="form-label">Color</label>
              <div id="add-color-palette" class="color-palette"></div>
            </div>
          </div>
        </div>
        <div class="modal-footer">
          <button class="btn btn-ghost" onclick="closeModal('modal-add-plan')">Cancel</button>
          <button class="btn btn-primary" id="btn-add-plan-confirm">Add Plan</button>
        </div>
      </div>
    </div>

    <!-- Edit Service Plans Modal -->
    <div id="modal-edit-plans" class="modal-overlay" style="display:none;">
      <div class="modal">
        <div class="modal-header">
          <h2>Service Plans</h2>
          <button class="btn-icon" onclick="closeModal('modal-edit-plans')">
            <i class="fa-solid fa-xmark"></i>
          </button>
        </div>
        <div class="modal-body" id="edit-plans-list">
          <p style="color:var(--text-muted); font-size:13px;">No service plans yet.</p>
        </div>
        <div class="modal-footer">
          <button class="btn btn-ghost" onclick="closeModal('modal-edit-plans')">Close</button>
        </div>
      </div>
    </div>

    <!-- Upload Overlay -->
    <div id="upload-overlay">
      <div class="upload-card" id="upload-card">
        <i class="fa-solid fa-file-excel"></i>
        <h2>Upload Excel File</h2>
        <p>Click or drag &amp; drop a .xlsx file with service sheets</p>
        <input type="file" id="file-input" accept=".xlsx,.xls" style="display:none;">
      </div>
    </div>

    <!-- Toast -->
    <div id="toast"></div>

    <!-- ============================================================
    Application Scripts (load order matters)
    ============================================================ -->
    <script src="js/constants.js"></script>
    <script src="js/dom.js"></script>
    <script src="js/utils.js"></script>
    <script src="js/state-manager.js"></script>
    <script src="js/state.js"></script>
    <script src="js/schedule.js"></script>
    <script src="js/plans.js"></script>
    <script src="js/parser.js"></script>
    <script src="js/chart.js"></script>
    <script src="js/ui.js"></script>
    <script src="js/app.js"></script>

  </body>
</html>
