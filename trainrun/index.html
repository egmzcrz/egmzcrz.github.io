<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8">
    <title>Train Run Simulation</title>
    <script src="https://cdn.plot.ly/plotly-2.27.0.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/js-yaml/4.1.0/js-yaml.min.js"></script>
    <script src="engine.js"></script>
    <script src="interface.js"></script>
    <link rel="stylesheet" href="style.css">
  </head>
  <body>

    <div id="sidebar">
      <h2>Simulation Parameters</h2>

      <div class="form-group">
        <label>Track Geometry (CSV)</label>
        <input type="file" id="fileCsv" accept=".csv">
      </div>

      <div class="form-group">
        <label>Rolling Stock (YAML)</label>
        <input type="file" id="fileYaml" accept=".yaml,.yml">
      </div>

      <div class="form-group">
        <label>Dwell Time at Stations (s)</label>
        <input type="number" id="dwell" value="0.0" step="1">
      </div>

      <div class="form-group">
        <label>Points per KM (ppkm)</label>
        <input type="number" id="ppkm" value="1000" min="100" step="10">
      </div>

      <div class="form-group checkbox-group">
        <input type="checkbox" id="reverse">
        <label for="reverse" style="margin: 0;">Reverse Direction</label>
      </div>

      <button id="btnRun">Run Simulation</button>

      <div class="results" id="resultsBox">
        <div><strong>Train:</strong> <span id="resName">-</span></div>
        <div><strong>Time:</strong> <span id="resTime">-</span></div>
        <div><strong>Energy:</strong> <span id="resEnergy">-</span></div>
      </div>

      <button id="btnExport" style="display: none; margin-top: 15px; background: #28a745;">Download CSV Profile</button>
    </div>

    <div id="main">
      <div id="plot"></div>
    </div>

  </body>
</html>
